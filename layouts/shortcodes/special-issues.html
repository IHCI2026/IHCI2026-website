{{- $issues := where (site.Params.themes.event.specialIssues | default slice) "show" true }}
{{- if gt (len $issues) 0 }}
<div class="special-issues__card">
    {{- range $issues }}
        <div class="special-issues__item">
            {{- with .logo }}
                {{- with resources.Get . }}
                {{ $logo := .Fit "320x160 webp q90" }}
                <div class="special-issues__logo-wrap">
                    <img src="{{ $logo.RelPermalink }}" alt="" class="special-issues__logo" width="{{ $logo.Width }}" height="{{ $logo.Height }}" />
                </div>
                {{- end }}
            {{- end }}
            <a href="{{ .url }}" target="_blank" rel="noopener noreferrer" class="special-issues__link">{{ .title }}</a>
        </div>
    {{- end }}
</div>
{{- end }}
