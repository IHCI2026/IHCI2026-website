{{ $input := . }}


<div class="sponsor-card">
    <a class="sponsor-card__link" href="{{ $input.companyUrl }}">
        {{ with resources.Get $input.logoResource }}
            {{ if eq .MediaType.SubType "svg" }}
                <img class="sponsor-card__logo" src="{{ .RelPermalink }}" alt="{{ $input.name }}" />
            {{ else }}
                {{ $logo := .Fit "480x480 webp q90" }}
                <img class="sponsor-card__logo" src="{{ $logo.RelPermalink }}" alt="{{ $input.name }}" width="{{ $logo.Width }}" height="{{ $logo.Height }}" />
            {{ end }}
        {{ end }}
    </a>
</div>
