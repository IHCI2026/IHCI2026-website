{{ $id := delimit (shuffle (seq 1000)) "" | truncate 6 "" }}

<div class="map-container">
    <div id="map-{{ $id }}" class="map-container__map"></div>
    {{- if .amapViewUrl }}
        <a
            href="{{ .amapViewUrl }}"
            rel="external"
            target="_blank"
            class="map-container__button"
            aria-label="{{ T "location_page.map_fullscreen" }}">
            {{ with resources.Get "icons/fullscreen.svg" }}
                <img src="{{ .RelPermalink | htmlUnescape }}" alt="Fullscreen Icon" width="18" height="18" />
            {{ end }}
        </a>
    {{- end }}
</div>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
(function() {
    var map = L.map('map-{{ $id }}', { scrollWheelZoom: false }).setView([{{ .lat }}, {{ .lon }}], {{ .zoom }});
    L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
        subdomains: '1234',
        maxZoom: 18,
        attribution: '&copy; <a href="https://www.amap.com/">Amap</a>'
    }).addTo(map);
    L.marker([{{ .lat }}, {{ .lon }}]).addTo(map)
        .bindPopup('University of Nottingham Ningbo China')
        .openPopup();
})();
</script>
